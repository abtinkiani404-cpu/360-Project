<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>پروژه ۳۶۰ | فرماندهی هیدراتاسیون</title>
    
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Vazirmatn', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            blue: '#1d4ed8',
                            light: '#60a5fa',
                            gold: '#fbbf24'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0b1120;
            background-image: radial-gradient(circle at 50% 0%, rgba(29, 78, 216, 0.15), transparent 50%);
            color: #f8fafc;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            will-change: stroke-dashoffset;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        
        .goal-reached-ring {
            animation: pulse-gold 2s infinite;
            border-color: #fbbf24 !important;
            background: rgba(251, 191, 36, 0.05);
        }

        .water-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .water-btn:active { transform: scale(0.92); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(96, 165, 250, 0.3); border-radius: 10px; }
    </style>
</head>

<body class="p-4 md:p-10">

    <main class="max-w-6xl mx-auto min-h-screen">
        
        <header class="flex justify-between items-center mb-8 glass-panel p-4 rounded-3xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-brand-blue to-blue-400 flex items-center justify-center text-xl font-bold shadow-lg">آ</div>
                <div>
                    <h2 class="text-xl font-bold text-white">پروژه ۳۶۰</h2>
                    <p class="text-slate-400 text-sm" id="persian-date">در حال بارگذاری...</p>
                </div>
            </div>
            <div class="text-left hidden md:block">
                <p class="text-sm text-brand-light font-bold">ورود به پایه دهم</p>
                <p class="text-xs text-slate-400">قدرتمندتر از همیشه</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 flex flex-col gap-6">
                
                <div id="main-water-card" class="glass-panel rounded-3xl p-8 flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 border border-blue-500/20">
                    
                    <div class="w-full flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-white"><i class="fas fa-tint text-brand-light ml-2"></i>هیدراتاسیون امروز</h3>
                        <div class="flex items-center bg-white/5 rounded-xl p-1 border border-white/10 px-3">
                            <span class="text-xs text-slate-400 ml-2">هدف روزانه:</span>
                            <input type="number" id="goal-input" class="w-10 bg-transparent text-white text-center font-bold outline-none" value="10" min="1" max="30">
                        </div>
                    </div>

                    <div class="relative w-64 h-64 mx-auto mb-8">
                        <div id="ring-glow" class="absolute inset-0 rounded-full border-4 border-blue-900/30 transition-all duration-500"></div>
                        
                        <svg class="w-full h-full drop-shadow-lg" viewBox="0 0 120 120">
                            <circle class="text-slate-800" stroke-width="8" stroke="currentColor" fill="none" r="52" cx="60" cy="60" />
                            <circle id="water-progress-ring" class="progress-ring__circle text-brand-light transition-colors duration-500" stroke-width="8" stroke-dasharray="326.7" stroke-dashoffset="326.7" stroke-linecap="round" stroke="currentColor" fill="none" r="52" cx="60" cy="60" />
                        </svg>
                        
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center w-full">
                            <div class="flex items-baseline justify-center gap-1">
                                <span id="water-count-display" class="text-7xl font-black text-white drop-shadow-md">0</span>
                            </div>
                            <span id="water-status-text" class="block text-sm text-blue-400 mt-2 font-bold tracking-wider">۰٪ تکمیل شده</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3 w-full relative z-10">
                        <button onclick="modifyWater(1, 'یک لیوان')" class="water-btn flex flex-col items-center justify-center p-3 rounded-2xl bg-gradient-to-br from-blue-600 to-brand-blue shadow-lg border border-blue-400/30">
                            <i class="fas fa-glass-water text-xl mb-1 text-white"></i>
                            <span class="text-xs font-bold text-white">+۱ لیوان</span>
                        </button>
                        <button onclick="modifyWater(2, 'یک بطری')" class="water-btn flex flex-col items-center justify-center p-3 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10">
                            <i class="fas fa-bottle-water text-xl mb-1 text-brand-light"></i>
                            <span class="text-xs text-slate-300 font-bold">+ بطری (۲)</span>
                        </button>
                        <button onclick="modifyWater(4, 'قمقمه بزرگ')" class="water-btn flex flex-col items-center justify-center p-3 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10">
                            <i class="fas fa-jug-detergent text-xl mb-1 text-brand-light"></i>
                            <span class="text-xs text-slate-300 font-bold">+ قمقمه (۴)</span>
                        </button>
                    </div>
                    
                    <button onclick="modifyWater(-1, 'اصلاح')" class="mt-4 text-xs text-slate-500 hover:text-slate-300 transition underline">اشتباه زدم (-۱)</button>
                </div>
            </div>

            <div class="lg:col-span-7 flex flex-col gap-6">
                
                <div class="glass-panel rounded-3xl p-6 relative flex flex-col h-full border border-white/5">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                        <h3 class="text-xl font-bold text-white"><i class="fas fa-chart-area text-purple-400 ml-2"></i>آنالیز مصرف آب</h3>
                        
                        <div class="flex bg-slate-900/50 p-1 rounded-xl border border-white/10">
                            <button onclick="changeChartRange('7', this)" class="chart-range-btn px-4 py-1.5 rounded-lg text-sm font-bold bg-brand-blue text-white transition-all shadow-md">یک هفته</button>
                            <button onclick="changeChartRange('30', this)" class="chart-range-btn px-4 py-1.5 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all">یک ماه</button>
                            <button onclick="changeChartRange('90', this)" class="chart-range-btn px-4 py-1.5 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all">سه ماه</button>
                        </div>
                    </div>
                    
                    <div id="waterHistoryChart" class="w-full flex-grow min-h-[300px]"></div>
                </div>

                <div class="glass-panel rounded-3xl p-6 border border-white/5">
                    <h3 class="text-lg font-bold text-white mb-4"><i class="fas fa-history text-emerald-400 ml-2"></i>گزارش نوشیدن امروز</h3>
                    <div class="h-32 overflow-y-auto pr-2 space-y-2" id="timeline-container">
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        let waterChartInstance = null;
        const DB_KEY = '360_hydration_db';
        const todayISO = new Date().toISOString().split('T')[0]; 
        
        document.getElementById('persian-date').innerText = new Intl.DateTimeFormat('fa-IR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).format(new Date());

        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
            history: {},
            logs: [],
            lastDate: todayISO, 
            todayCount: 0,
            dailyGoal: 10
        };

        if (db.lastDate !== todayISO) {
            db.history[db.lastDate] = db.todayCount;
            db.lastDate = todayISO;
            db.todayCount = 0;
            db.logs = [];
            saveDB();
        }

        function saveDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        const uiCount = document.getElementById('water-count-display');
        const uiStatus = document.getElementById('water-status-text');
        const uiRing = document.getElementById('water-progress-ring');
        const uiGlow = document.getElementById('ring-glow');
        const uiGoalInput = document.getElementById('goal-input');
        const timelineContainer = document.getElementById('timeline-container');
        
        uiGoalInput.value = db.dailyGoal;
        const circleCircumference = 326.7;

        window.modifyWater = function(amount, typeName) {
            if (db.todayCount + amount < 0) return;
            db.todayCount += amount;

            if (amount > 0) {
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                db.logs.unshift({ time: timeString, amount: amount, type: typeName });
                if(db.logs.length > 20) db.logs.pop();
            } else {
                db.logs.shift();
            }

            saveDB();
            refreshUI();
            
            gsap.fromTo(uiCount, { scale: 1.5 }, { scale: 1, duration: 0.5, ease: "elastic.out(1, 0.5)" });
            
            if (waterChartInstance) {
                updateChartData(document.querySelector('.chart-range-btn.bg-brand-blue').getAttribute('onclick').match(/'(\d+)'/)[1]);
            }
        };

        uiGoalInput.addEventListener('change', (e) => {
            let newGoal = parseInt(e.target.value);
            if (newGoal > 0) {
                db.dailyGoal = newGoal;
                saveDB();
                refreshUI();
            }
        });

        function refreshUI() {
            uiCount.innerText = db.todayCount;
            let percent = (db.todayCount / db.dailyGoal) * 100;
            
            if (db.todayCount >= db.dailyGoal) {
                uiStatus.innerText = "🎉 هدف تکمیل شد!";
                uiStatus.classList.replace('text-blue-400', 'text-brand-gold');
                uiRing.classList.replace('text-brand-light', 'text-brand-gold');
                uiGlow.classList.add('goal-reached-ring');
            } else {
                uiStatus.innerText = `${Math.floor(percent)}٪ تکمیل شده`;
                uiStatus.classList.replace('text-brand-gold', 'text-blue-400');
                uiRing.classList.replace('text-brand-gold', 'text-brand-light');
                uiGlow.classList.remove('goal-reached-ring');
            }

            if (percent > 100) percent = 100;
            
            const offset = circleCircumference - (percent / 100) * circleCircumference;
            uiRing.style.strokeDashoffset = offset;

            renderTimeline();
        }

        function renderTimeline() {
            if (db.logs.length === 0) {
                timelineContainer.innerHTML = '<p class="text-slate-500 text-sm text-center mt-4">هنوز آبی ننوشیدی!</p>';
                return;
            }
            
            timelineContainer.innerHTML = db.logs.map(log => `
                <div class="flex items-center justify-between p-2 rounded-xl bg-white/5 border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center text-xs"><i class="fas fa-tint"></i></div>
                        <span class="text-sm text-slate-200">${log.type}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-brand-light">+${log.amount}</span>
                        <span class="text-xs text-slate-500">${log.time}</span>
                    </div>
                </div>
            `).join('');
        }

        function getPersianDateStr(dateObj, range) {
            const options = range > 7 
                ? { day: 'numeric', month: 'numeric' } 
                : { weekday: 'long' };
            return new Intl.DateTimeFormat('fa-IR', options).format(dateObj);
        }

        function generateData(daysToLookBack) {
            let categories = [];
            let seriesData = [];
            
            for(let i = daysToLookBack - 1; i >= 0; i--) {
                let d = new Date();
                d.setDate(d.getDate() - i);
                let targetISO = d.toISOString().split('T')[0];
                
                categories.push(getPersianDateStr(d, daysToLookBack));
                
                if (targetISO === todayISO) {
                    seriesData.push(db.todayCount);
                } else {
                    seriesData.push(db.history[targetISO] || 0);
                }
            }
            return { categories, seriesData };
        }

        function initChart() {
            const initialData = generateData(7);
            
            const options = {
                series: [{ name: 'تعداد لیوان', data: initialData.seriesData }],
                chart: {
                    type: 'area',
                    height: '100%',
                    fontFamily: 'Vazirmatn, sans-serif',
                    toolbar: { show: false },
                    animations: { enabled: true, easing: 'easeinout', speed: 800 }
                },
                colors: ['#3b82f6'],
                fill: {
                    type: 'gradient',
                    gradient: { shadeIntensity: 1, opacityFrom: 0.6, opacityTo: 0.05, stops: [0, 100] }
                },
                dataLabels: { enabled: false },
                stroke: { curve: 'smooth', width: 3 },
                xaxis: {
                    categories: initialData.categories,
                    labels: { style: { colors: '#64748b' } },
                    axisBorder: { show: false },
                    axisTicks: { show: false }
                },
                yaxis: {
                    labels: { style: { colors: '#64748b' }, formatter: (val) => Math.floor(val) },
                    min: 0
                },
                grid: { borderColor: 'rgba(255,255,255,0.05)', strokeDashArray: 4 },
                theme: { mode: 'dark' },
                tooltip: { theme: 'dark', y: { formatter: (val) => val + " لیوان" } }
            };

            waterChartInstance = new ApexCharts(document.querySelector("#waterHistoryChart"), options);
            waterChartInstance.render();
        }

        window.changeChartRange = function(days, btnElement) {
            document.querySelectorAll('.chart-range-btn').forEach(btn => {
                btn.classList.remove('bg-brand-blue', 'text-white', 'shadow-md');
                btn.classList.add('text-slate-400', 'bg-transparent');
            });
            btnElement.classList.add('bg-brand-blue', 'text-white', 'shadow-md');
            btnElement.classList.remove('text-slate-400', 'bg-transparent');

            updateChartData(days);
        }

        window.updateChartData = function(days) {
            const newData = generateData(parseInt(days));
            waterChartInstance.updateOptions({
                xaxis: { categories: newData.categories }
            });
            waterChartInstance.updateSeries([{ data: newData.seriesData }]);
        }

        refreshUI();
        initChart();
    </script>
</body>
</html>
