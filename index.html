<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>پروژه ۳۶۰ | داشبورد</title>
    
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Vazirmatn', 'sans-serif'] },
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            blue: '#1d4ed8', 
                            light: '#60a5fa'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0b1120;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(29, 78, 216, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(29, 78, 216, 0.15), transparent 25%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .nav-item.active {
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background-color: #60a5fa;
            border-radius: 50%;
            box-shadow: 0 0 8px #60a5fa;
        }

        html, body { overflow-x: hidden; }
        
        @media (min-width: 768px) {
            .glass-panel:hover {
                transform: translateY(-5px);
                border-color: rgba(96, 165, 250, 0.3);
                box-shadow: 0 10px 40px rgba(29, 78, 216, 0.2);
                transition: all 0.3s ease;
            }
        }
    </style>
</head>
<body class="text-slate-200 pb-20 md:pb-0 md:pr-64">

    <nav class="md:hidden fixed bottom-0 w-full glass-panel z-50 border-t border-white/10 rounded-t-2xl px-6 py-4 flex justify-between items-center text-slate-400">
        <a href="#" class="nav-item active relative flex flex-col items-center text-xl transition-colors"><i class="fas fa-home"></i></a>
        <a href="#" class="nav-item relative flex flex-col items-center text-xl transition-colors hover:text-white"><i class="fas fa-tint"></i></a>
        <a href="#" class="relative -top-6 bg-brand-blue w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-[0_0_20px_rgba(29,78,216,0.5)] border-4 border-[#0b1120]"><i class="fas fa-plus"></i></a>
        <a href="#" class="nav-item relative flex flex-col items-center text-xl transition-colors hover:text-white"><i class="fas fa-bed"></i></a>
        <a href="#" class="nav-item relative flex flex-col items-center text-xl transition-colors hover:text-white"><i class="fas fa-chart-pie"></i></a>
    </nav>

    <aside class="hidden md:flex flex-col fixed right-0 top-0 w-64 h-screen glass-panel z-50 border-l border-white/5 py-8">
        <div class="px-8 mb-10 text-center">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-brand-blue">پروژه ۳۶۰</h1>
        </div>
        <div class="flex flex-col gap-2 px-4">
            <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl bg-blue-500/10 text-blue-400 border border-blue-500/20"><i class="fas fa-home w-6"></i> داشبورد</a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all"><i class="fas fa-tint w-6"></i> ردیاب آب</a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all"><i class="fas fa-tasks w-6"></i> روتین‌ها</a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all"><i class="fas fa-bed w-6"></i> خواب و استراحت</a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all"><i class="fas fa-trophy w-6"></i> دستاوردها</a>
        </div>
    </aside>

    <main class="p-5 md:p-10 max-w-7xl mx-auto">
        
        <header class="flex justify-between items-center mb-8 mt-4 md:mt-0">
            <div>
                <h2 class="text-3xl font-bold text-white mb-1">سلام آبتین!</h2>
                <p class="text-slate-400 text-sm">امروز فرصتی برای یک شاهکار جدیده.</p>
            </div>
            <div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center border-brand-blue/30 text-brand-blue">
                <i class="fas fa-bell"></i>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="glass-panel rounded-3xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-brand-blue/20 rounded-full blur-2xl"></div>
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-white"><i class="fas fa-bolt text-yellow-400 ml-2"></i>فعالیت‌های امروز</h3>
                    <span class="text-xs bg-white/10 px-3 py-1 rounded-full">۲ از ۵</span>
                </div>
                
                <div class="space-y-3">
                    <div class="flex items-center justify-between p-3 rounded-2xl bg-white/5 border border-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center"><i class="fas fa-check"></i></div>
                            <span class="text-sm">تمرین و کوک سه‌تار</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-3 rounded-2xl bg-white/5 border border-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-brand-blue/20 text-brand-light flex items-center justify-center"><i class="fas fa-hourglass-half"></i></div>
                            <span class="text-sm">مرور ساختار غزل</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-6 text-center flex flex-col justify-center relative">
                <h3 class="text-lg font-bold text-white mb-4 text-right"><i class="fas fa-tint text-blue-400 ml-2"></i>هیدراتاسیون</h3>
                
                <div class="relative w-32 h-32 mx-auto mb-4">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="text-slate-700" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="water-circle" class="text-blue-500 transition-all duration-500 ease-in-out" stroke-width="3" stroke-dasharray="0, 100" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center">
                        <span id="water-count" class="text-2xl font-bold text-white">۰</span>
                        <span class="block text-[10px] text-slate-400">از ۱۰ لیوان</span>
                    </div>
                </div>
                
                <div class="flex justify-center gap-4">
                    <button id="btn-minus" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 transition flex items-center justify-center"><i class="fas fa-minus"></i></button>
                    <button id="btn-plus" class="w-10 h-10 rounded-full bg-brand-blue hover:bg-blue-600 transition flex items-center justify-center shadow-lg shadow-blue-500/30"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-6">
                <h3 class="text-lg font-bold text-white mb-4"><i class="fas fa-chart-line text-purple-400 ml-2"></i>روند پیشرفت</h3>
                <div class="w-full h-32 rounded-xl bg-gradient-to-t from-brand-blue/10 to-transparent border border-white/5 flex items-end px-2 pb-2 gap-2">
                    <div class="w-1/5 bg-brand-blue/40 rounded-t-md h-1/3 hover:bg-brand-blue transition"></div>
                    <div class="w-1/5 bg-brand-blue/60 rounded-t-md h-2/3 hover:bg-brand-blue transition"></div>
                    <div class="w-1/5 bg-brand-blue/30 rounded-t-md h-1/4 hover:bg-brand-blue transition"></div>
                    <div class="w-1/5 bg-brand-blue rounded-t-md h-full shadow-[0_0_15px_rgba(29,78,216,0.5)]"></div>
                    <div class="w-1/5 bg-brand-blue/50 rounded-t-md h-1/2 hover:bg-brand-blue transition"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const dailyGoal = 10;
            let currentWater = 0;
            
            const today = new Date().toLocaleDateString('fa-IR');
            let savedDate = localStorage.getItem('360_date');

            if (savedDate !== today) {
                currentWater = 0; 
                localStorage.setItem('360_date', today);
                localStorage.setItem('360_water', 0);
            } else {
                currentWater = parseInt(localStorage.getItem('360_water')) || 0;
            }

            const waterText = document.getElementById('water-count');
            const waterCircle = document.getElementById('water-circle');
            const btnPlus = document.getElementById('btn-plus');
            const btnMinus = document.getElementById('btn-minus');

            function updateWaterUI() {
                waterText.innerText = currentWater;
                let percentage = (currentWater / dailyGoal) * 100;
                if (percentage > 100) percentage = 100; 
                waterCircle.style.strokeDasharray = `${percentage}, 100`;
                localStorage.setItem('360_water', currentWater);
            }

            btnPlus.addEventListener('click', () => {
                currentWater++;
                updateWaterUI();
            });

            btnMinus.addEventListener('click', () => {
                if (currentWater > 0) {
                    currentWater--;
                    updateWaterUI();
                }
            });

            updateWaterUI();
        });
    </script>
</body>
</html>
